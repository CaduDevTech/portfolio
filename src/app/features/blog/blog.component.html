<section id="blog" class="py-20 bg-muted/30">
  <div class="container mx-auto px-4">
    <div class="text-center mb-16 fade-in" appRevealOnScroll>
      <h2 class="text-3xl md:text-4xl font-bold text-foreground mb-4">
        Publicações Relevantes
      </h2>
      <p class="text-xl text-muted-foreground max-w-2xl mx-auto text-pretty">
        Publicações sobre desenvolvimento web e relacionados a programação.
      </p>
    </div>

    <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-8 fade-in" appRevealOnScroll>
      <div
        *ngFor="let post of posts; let index = index"
        class="card-hover bg-card rounded-xl overflow-hidden shadow-lg fade-in visible cursor-pointer"
        [style.animation-delay.ms]="index * 100"
      >
        <div class="relative overflow-hidden rounded-t-lg group">
          <img
            loading="lazy"
            [src]="post.image"
            [alt]="post.title"
            class="w-full h-48 object-cover group-hover:scale-105 transition-transform duration-300"
          />
        </div>

        <div class="p-6">
          <div class="flex items-center space-x-4 text-sm text-muted-foreground mb-2 visible fade-in">
            <div class="flex items-center">
              <lucide-angular [img]="calendarIcon" class="mr-1 h-4 w-4" />
              {{ formatDate(post.date) }}
            </div>
          </div>

          <h3 class="text-lg font-semibold text-foreground group-hover:text-accent transition-colors mb-3">
            {{ post.title }}
          </h3>

          <p class="text-muted-foreground text-sm mb-4">{{ post.excerpt }}</p>

          <div class="flex flex-wrap gap-2 mb-4">
            <span *ngFor="let tag of post.tags" class="badge badge-secondary text-xs">
              {{ tag }}
            </span>
          </div>

          <a
            [href]="post.url || 'https://www.linkedin.com/in/carlos-eduardo-tecnologia/recent-activity/all/'"
            target="_blank"
            rel="noopener noreferrer"
            class="btn-ghost p-0 h-auto group/button"
          >
            Ler mais
            <lucide-angular
              [img]="arrowRightIcon"
              class="ml-2 h-4 w-4 group-hover/button:translate-x-1 transition-transform"
            />
          </a>
        </div>
      </div>
    </div>

    <div class="text-center mt-12 fade-in" appRevealOnScroll>
      <a
        target="_blank"
        rel="noopener noreferrer"
        href="https://www.linkedin.com/in/carlos-eduardo-tecnologia/recent-activity/all/"
      >
        <button class="btn-outline px-8 py-3 rounded-md font-medium">
          Ver todas as Publicações
          <lucide-angular [img]="arrowRightIcon" class="ml-2 h-4 w-4" />
        </button>
      </a>
    </div>
  </div>
</section>
