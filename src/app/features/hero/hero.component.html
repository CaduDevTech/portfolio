<section
  id="home"
  class="min-h-screen flex items-center justify-center relative overflow-hidden"
>
  <div class="absolute inset-0 -z-10">
    <div
      class="absolute top-1/4 left-1/4 w-72 h-72 bg-accent/10 rounded-full blur-3xl animate-float"
    ></div>
    <div
      class="absolute bottom-1/4 right-1/4 w-96 h-96 bg-secondary/10 rounded-full blur-3xl animate-float"
      style="animation-delay: 1s"
    ></div>
  </div>

  <div class="container mx-auto px-4 text-center">
    <div class="fade-in visible" id="hero-content">
      <h1 class="div-write" id="hero-title">{{ heroTitle }}</h1>
      <p
        class="text-xl md:text-2xl text-muted-foreground mb-8 max-w-3xl mx-auto text-pretty"
      >
        Bem vindo ao meu portfólio! Sou Carlos Eduardo, um desenvolvedor full
        stack apaixonado por tecnologia.
      </p>

      <div
        class="flex flex-col sm:flex-row items-center justify-center text-center gap-4 mb-12"
      >
        <button
          (click)="navigateToProjects.emit()"
          class="btn-primary px-8 py-4 rounded-md font-medium group transition-all hover:scale-105"
        >
          Ver Projetos
          <lucide-angular
            [img]="arrowDownIcon"
            class="ml-2 h-4 w-4 group-hover:translate-y-1 transition-transform"
          />
        </button>
      </div>

      <div class="flex items-center justify-center space-x-6">
        <a
          href="https://github.com/CaduDevTech"
          target="_blank"
          rel="noopener noreferrer"
          class="btn-ghost p-3 rounded-md hover:scale-110 transition-transform"
        >
          <lucide-angular [img]="githubIcon" class="h-6 w-6" />
        </a>
        <a
          href="https://www.linkedin.com/in/carlos-eduardo-tecnologia"
          target="_blank"
          rel="noopener noreferrer"
          class="btn-ghost p-3 rounded-md hover:scale-110 transition-transform"
        >
          <lucide-angular [img]="linkedinIcon" class="h-6 w-6" />
        </a>
      </div>
    </div>
  </div>
</section>
