<div
  *ngIf="message as currentMessage"
  id="modalIndisponivel"
  class="fixed inset-0 flex items-center justify-center bg-black bg-opacity-50 modal-indisponivel"
  role="alertdialog"
  aria-modal="true"
  (click)="onOverlayClick($event)"
>
  <div class="bg-white rounded-lg shadow-lg w-full max-w-md mx-4 p-6 max-h-[calc(100vh-2rem)] overflow-y-auto">
    <h2 class="text-xl font-semibold text-center text-gray-800 mb-4">
      {{ currentMessage.title }}
    </h2>
    <p
      class="text-gray-600 text-center mb-6"
      [innerHTML]="currentMessage.descriptionHtml | safeHtml"
    ></p>
    <div class="flex justify-center">
      <button
        class="bg-blue-500 text-white px-4 py-2 rounded-md hover:bg-blue-600 focus:outline-none focus:ring-2 focus:ring-blue-400"
        (click)="close.emit()"
      >
        Fechar
      </button>
    </div>
  </div>
</div>
